<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLZONE 智能应用</title>
    <!-- 引入样式和功能库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .transition-all { transition: all 0.4s ease; }
        /* 确保内容区的图片和表格样式好看 */
        #ui-content img { max-width: 100%; height: auto; }
        #ui-content table { border-collapse: collapse; width: 100%; }
        #ui-content th, #ui-content td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <!-- 1. 侧边栏 (Sidebar) -->
    <aside id="mySidebar" class="w-64 bg-gray-900 text-white p-6 flex flex-col transition-all">
        <h1 id="ui-title" class="text-xl font-bold mb-8 italic">GLZONE</h1>
        <nav id="ui-menu" class="flex-1 space-y-2">
            <div class="text-gray-500 text-sm">等待指令生成菜单...</div>
        </nav>
        <div class="text-xs text-gray-500 border-t border-gray-800 pt-4">
            版本 1.0.1
        </div>
    </aside>

    <!-- 2. 右侧主区域 -->
    <div class="flex-1 flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="h-14 bg-white border-b flex items-center px-6 justify-between shadow-sm">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="ui-status" class="text-sm font-medium text-gray-500">状态：就绪</span>
            </div>
            
            <div class="flex space-x-2">
                <input id="userInput" type="text" placeholder="输入指令，例如：生成追剧日历" 
                       class="border rounded-l px-3 py-1 text-sm w-80 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="askGemini()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded-r text-sm transition-colors">
                    执行指令
                </button>
            </div>
        </header>

        <!-- 主内容显示区 -->
        <main class="flex-1 overflow-auto p-8 bg-slate-100">
            <div id="ui-content" class="prose max-w-none bg-white p-10 rounded-xl shadow-lg min-h-full">
                <h2 class="text-gray-400">👋 欢迎使用 GLZONE 智能系统</h2>
                <p class="text-gray-400">请在上方输入框下达指令，我会自动调整外壳和内容。</p>
            </div>
        </main>
    </div>

    <!-- 3. 这里是 JavaScript “大脑” 部分 -->
    <script>
        // 核心功能：根据 JSON 更新界面
        function updateWebsite(jsonData) {
            try {
                // 更新标题
                document.getElementById('ui-title').innerText = jsonData.ui.title;

                // 更新侧边栏颜色
                document.getElementById('mySidebar').style.backgroundColor = jsonData.ui.color;

                // 更新菜单
                const menuHtml = jsonData.ui.menu.map(item => 
                    `<div class="py-2 px-4 hover:bg-white/10 rounded-lg cursor-pointer transition-colors text-sm border border-transparent hover:border-white/20">
                        ${item}
                    </div>`
                ).join('');
                document.getElementById('ui-menu').innerHTML = menuHtml;

                // 更新状态栏
                document.getElementById('ui-status').innerText = "状态：" + jsonData.ui.status;

                // 更新主内容 (使用 marked 库解析 Markdown)
                document.getElementById('ui-content').innerHTML = marked.parse(jsonData.content);

            } catch (e) {
                console.error("UI 更新失败，数据格式可能不正确:", e);
                alert("AI 返回的数据格式有误，请重试。");
            }
        }

        // 点击发送按钮触发的逻辑
        async function askGemini() {
            const input = document.getElementById('userInput').value;
            if(!input) return;
            
            // 改变状态显示
            document.getElementById('ui-status').innerText = "状态：Gemini 正在处理中...";
            
            // -------------------------------------------------------
            // 注意：这里目前是“模拟”数据。
            // 当你准备好后，我们需要把真正的 API 调用代码放在这里。
            // -------------------------------------------------------
            const demoResponse = {
                "ui": {
                    "title": "追剧日历 GLZONE",
                    "menu": ["📅 日历视图", "🎬 剧集管理", "🖼️ 导出海报"],
                    "color": "#1e3a8a", 
                    "status": "已成功生成布局"
                },
                "content": "### ✅ 任务已完成\n\n我已经为你生成了 **追剧日历** 的布局。你可以看到侧边栏已经自动变色并更新了菜单项。\n\n- **当前进度**：已同步最新的剧集数据。\n- **建议操作**：点击左侧“导出海报”即可分享给好友。"
            };

            // 模拟 1 秒后的延迟返回
            setTimeout(() => {
                updateWebsite(demoResponse);
            }, 1000);
        }
    </script>

</body>
</html>
