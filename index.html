<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>GLZONE 智能应用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .transition-all { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <!-- 1. 侧边栏 (Sidebar) -->
    <aside id="mySidebar" class="w-64 bg-gray-900 text-white p-6 flex flex-col transition-all">
        <h1 id="ui-title" class="text-xl font-bold mb-8">等待指令...</h1>
        <nav id="ui-menu" class="flex-1 space-y-2">
            <!-- 动态菜单会出现在这里 -->
        </nav>
    </aside>

    <!-- 2. 右侧主区域 -->
    <div class="flex-1 flex flex-col">
        <!-- 顶部栏 -->
        <header class="h-14 bg-white border-b flex items-center px-6 justify-between">
            <span id="ui-status" class="text-sm font-medium text-gray-500">状态：就绪</span>
            <div class="space-x-2">
                <input id="userInput" type="text" placeholder="给 Gemini 下指令..." class="border rounded px-3 py-1 text-sm w-64">
                <button onclick="askGemini()" class="bg-blue-600 text-white px-4 py-1 rounded text-sm">发送</button>
            </div>
        </header>

        <!-- 内容显示区 -->
        <main class="flex-1 overflow-auto p-8">
            <div id="ui-content" class="prose max-w-none bg-white p-8 rounded shadow-sm">
                这里将显示 Gemini 生成的内容...
            </div>
        </main>
    </div>

    <!-- 第三步的代码将放在这里 -->
</body>
</html>
